<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Bear Classifier</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 { margin-top: 0; font-size: 1.8rem; }
        p { color: var(--text-muted); margin-bottom: 30px; }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        #file-input { display: none; }

        #image-preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            display: none;
            margin: 0 auto;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        #result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #f8fafc;
            border-radius: 8px;
            display: none;
            text-align: left;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .progress-bar {
            background-color: #e2e8f0;
            border-radius: 999px;
            height: 8px;
            width: 100%;
            overflow: hidden;
            margin-top: 4px;
        }

        .progress-fill {
            background-color: var(--primary);
            height: 100%;
            border-radius: 999px;
            width: 0%;
            transition: width 0.5s ease-out;
        }

        #error-msg {
            color: #dc2626;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐻 Bear Classifier</h1>
        <p>Upload an image to identify if it's a Grizzly, Black, or Teddy bear.</p>

        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <span id="upload-text">Click to upload an image<br><small>(JPG or PNG)</small></span>
            <img id="image-preview" src="" alt="Preview">
            <input type="file" id="file-input" accept="image/png, image/jpeg">
        </div>

        <button id="analyze-btn" class="btn" disabled>Analyze Image</button>

        <div id="result-box"></div>
        <div id="error-msg"></div>
    </div>

    <script>
        // Your Space's direct URL (converted from keshavbatla/bear_types).
        // If this doesn't match, open https://huggingface.co/spaces/keshavbatla/bear_types
        // and copy the exact hostname from the address bar when the Space app itself loads.
        const SPACE_URL = "https://keshavbatla-bear-types.hf.space";
        const API_NAME = "classify_image"; // no leading slash here

        const fileInput = document.getElementById('file-input');
        const imagePreview = document.getElementById('image-preview');
        const uploadText = document.getElementById('upload-text');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultBox = document.getElementById('result-box');
        const errorMsg = document.getElementById('error-msg');

        let selectedFile = null;
        let base64Image = null;

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Image = e.target.result; // data:image/...;base64,....
                    imagePreview.src = base64Image;
                    imagePreview.style.display = 'block';
                    uploadText.style.display = 'none';
                    analyzeBtn.disabled = false;
                    resultBox.style.display = 'none';
                    errorMsg.textContent = '';
                };
                reader.readAsDataURL(file);
            }
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile || !base64Image) return;

            analyzeBtn.textContent = 'Analyzing... (Space may take ~20-30s to wake up)';
            analyzeBtn.disabled = true;
            errorMsg.textContent = '';
            resultBox.style.display = 'none';

            try {
                // Step 1: POST the job. Image input is sent as a FileData object
                // with the base64 data URI in the "url" field.
                const postResponse = await fetch(`${SPACE_URL}/call/${API_NAME}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        data: [
                            {
                                path: null,
                                url: base64Image,
                                orig_name: selectedFile.name,
                                mime_type: selectedFile.type,
                                meta: { "_type": "gradio.FileData" }
                            }
                        ]
                    })
                });

                if (!postResponse.ok) {
                    throw new Error(`POST failed with status ${postResponse.status}`);
                }

                const { event_id } = await postResponse.json();

                // Step 2: GET the result via server-sent events using the event_id.
                const result = await new Promise((resolve, reject) => {
                    const es = new EventSource(`${SPACE_URL}/call/${API_NAME}/${event_id}`);

                    es.addEventListener("complete", (e) => {
                        es.close();
                        resolve(JSON.parse(e.data));
                    });

                    es.addEventListener("error", (e) => {
                        es.close();
                        reject(new Error("Stream error while waiting for prediction."));
                    });
                });

                // result is the "data" array from your function's return values.
                // Expecting result[0] to be a Gradio Label output:
                // { label: "top_class", confidences: [{ label, confidence }, ...] }
                const output = result[0];
                const predictions = output.confidences ? output.confidences : [output];
                displayResults(predictions);

            } catch (error) {
                console.error("Error connecting to model:", error);
                errorMsg.textContent = "Error analyzing image: " + error.message + " (check browser console for details)";
            } finally {
                analyzeBtn.textContent = 'Analyze Image';
                analyzeBtn.disabled = false;
            }
        });

        function displayResults(predictions) {
            resultBox.innerHTML = '<h3>Results:</h3>';

            predictions.forEach(pred => {
                const percentage = (pred.confidence * 100).toFixed(1);

                const itemHtml = `
                    <div style="margin-bottom: 15px;">
                        <div class="result-item">
                            <span style="text-transform: capitalize;">${pred.label}</span>
                            <span>${percentage}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
                resultBox.innerHTML += itemHtml;
            });

            resultBox.style.display = 'block';
        }
    </script>
</body>
</html>
