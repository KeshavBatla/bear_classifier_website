<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Bear Classifier</title>
    <style>
        /* CSS: This handles all the modern styling, colors, and layout */
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 { margin-top: 0; font-size: 1.8rem; }
        p { color: var(--text-muted); margin-bottom: 30px; }

        /* The Image Upload Area */
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .upload-area:hover {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        #file-input { display: none; }
        
        #image-preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            display: none;
            margin: 0 auto;
        }

        /* Buttons and Results */
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        #result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #f8fafc;
            border-radius: 8px;
            display: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .progress-bar {
            background-color: #e2e8f0;
            border-radius: 999px;
            height: 8px;
            width: 100%;
            overflow: hidden;
            margin-top: 4px;
        }

        .progress-fill {
            background-color: var(--primary);
            height: 100%;
            border-radius: 999px;
            width: 0%;
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐻 Bear Classifier</h1>
        <p>Upload an image to identify if it's a Grizzly, Black, or Teddy bear.</p>

        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <span id="upload-text">Click to upload an image<br><small>(JPG or PNG)</small></span>
            <img id="image-preview" src="" alt="Preview">
            <input type="file" id="file-input" accept="image/png, image/jpeg">
        </div>

        <button id="analyze-btn" class="btn" disabled>Analyze Image</button>

        <div id="result-box">
            </div>
    </div>

    <script type="module">
        // Import the official Gradio Client
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        const fileInput = document.getElementById('file-input');
        const imagePreview = document.getElementById('image-preview');
        const uploadText = document.getElementById('upload-text');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultBox = document.getElementById('result-box');

        let selectedFile = null;

        // 1. Handle the image selection
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    uploadText.style.display = 'none';
                    analyzeBtn.disabled = false;
                    resultBox.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. Send the image to your Hugging Face Space
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            analyzeBtn.textContent = 'Analyzing...';
            analyzeBtn.disabled = true;

            try {
                // Connect to your specific Space
                const app = await client("keshavbatla/bear_types");
                
                // Send the image to the predict function
                const result = await app.predict("/predict", [selectedFile]);
                
                // The API returns a dictionary of labels and probabilities
                const predictions = result.data[0].confidences;
                displayResults(predictions);

            } catch (error) {
                console.error("Error connecting to model:", error);
                resultBox.innerHTML = "<p style='color: red;'>Error analyzing image. Please try again.</p>";
                resultBox.style.display = 'block';
            } finally {
                analyzeBtn.textContent = 'Analyze Image';
                analyzeBtn.disabled = false;
            }
        });

        // 3. Format and display the results
        function displayResults(predictions) {
            resultBox.innerHTML = '<h3>Results:</h3>';
            
            predictions.forEach(pred => {
                const percentage = (pred.confidence * 100).toFixed(1);
                
                const itemHtml = `
                    <div style="margin-bottom: 15px;">
                        <div class="result-item">
                            <span style="text-transform: capitalize;">${pred.label}</span>
                            <span>${percentage}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
                resultBox.innerHTML += itemHtml;
            });
            
            resultBox.style.display = 'block';
        }
    </script>
</body>
</html>
